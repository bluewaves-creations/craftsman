[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app. The shell installer is the
# receipt-writing path: `craftsman update` self-updates only for installs
# it can prove (the cargo-dist install receipt). Homebrew stays parked
# until the team decides on a tap repository.
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax).
# Team-only distribution (design decision #3): the three machines the team
# runs — mac arm64 + x86_64, linux x86_64. Widen when a machine appears.
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
