[project]
name = "craftsman"
stacks = ["rust"]
spec = "SPEC.md"
plan = "docs/plans/2026-07-17-cli-implementation-plan.md"
cli-version = "0.5.0"

[verify.rust]
runner = "cucumber-rs"
runner-target = "spec"
cwd = "cli"

[gates]
verify = "strict"
lint = "strict"
arch = "strict"
security = "strict"
health = "strict"
# spikes are frozen evidence, not shipped code; release.yml is generated
# verbatim by cargo-dist (its own `dist generate --check` job fails on any
# hand edit, so semgrep's curl|sh / interpolation findings there are not
# actionable here — upstream owns that file's shape)
exclude = ["spikes/**", ".github/workflows/release.yml"]
# mutate stays off as a commit gate: a tiny-diff run measured 30s wall
# (fresh tree copy + baseline + 8 mutants) — run `craftsman mutate` on
# demand at batch boundaries instead.

[arch]
# The verdict engine must not depend on gate orchestration: the
# dependency direction is gates -> verify, never verify -> gates
# (verified against the real import graph before enabling).
deny = ["src/verify -> src/gates"]

[gates.tools]
gitleaks = "8.24.0"
semgrep = "1.146.0"
osv-scanner = "2.4.0"

[ledger]
co-author = "Claude Fable 5 <noreply@anthropic.com>"
